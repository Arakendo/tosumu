name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  check:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { name: "stable / linux",   os: ubuntu-latest,  toolchain: stable }
          - { name: "stable / windows", os: windows-latest, toolchain: stable }
          - { name: "stable / macos",   os: macos-latest,   toolchain: stable }
          - { name: "beta / linux",     os: ubuntu-latest,  toolchain: beta }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.toolchain }}
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: cargo fmt
        run: cargo fmt --all -- --check
      - name: cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: cargo test
        run: cargo test --workspace --all-targets
      - name: cargo doc
        run: cargo doc --workspace --no-deps
